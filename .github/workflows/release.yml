name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  build-source-setup:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Package installer bundle
        shell: cmd
        run: call package.bat < nul

      - name: Zip the bundle
        shell: pwsh
        run: |
          $zipName = "RealtimeTranslator-Setup-${{ steps.ver.outputs.version }}.zip"
          Compress-Archive -Path "RealtimeTranslator-Setup\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact (non-tag builds)
        if: startsWith(github.ref, 'refs/tags/') == false
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeTranslator-Setup
          path: ${{ env.ZIP_NAME }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: RealtimeTranslator ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
